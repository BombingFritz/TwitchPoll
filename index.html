<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polls-Spargel-Latest</title>
    <style>
        body {
            width: 800px;
            height: 600px;
            background: transparent;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            overflow: hidden;
        }
        .widget-container {
            width: 800px;
            height: 600px;
            position: relative;
            background: rgba(0,0,0,0.75);
            border: 8px solid #4a7c23;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px #1113 inset;
            transition: opacity 0.5s ease;
            /* ✅ INITIAL HIDDEN - Startet unsichtbar */
            opacity: 0;
            visibility: hidden;
        }
        .widget-container.visible {
            opacity: 1;
            visibility: visible;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 4px solid #4a7c23;
            flex-shrink: 0;
            position: relative;
        }
        .logo {
            height: 70px;
            width: auto;
        }
        .poll-question {
            color: #ffffff;
            font-size: 28px;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            text-align: center;
            flex: 1;
            text-transform: uppercase;
        }
        .timer-container {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .timer {
            font-size: 32px;
            color: #ffdd00;
            text-shadow: 2px 2px 0 #000;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
        }

        .winner-announcement {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            padding: 7px 16px;
            color: #ffe680;
            background: rgba(0, 0, 0, 0.28);
            border: 2px solid rgba(255, 214, 64, 0.42);
            border-radius: 999px;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.7s ease, transform 0.7s ease;
            z-index: 120;
            white-space: nowrap;
            max-width: 88%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .winner-announcement.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .poll-area {
            position: absolute;
            left: 20px; right: 20px; bottom: 110px;
            width: auto;
            height: 310px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 1; /* Spargel im Hintergrund */
        }
        .grass-area {
            height: 100px;
            position: absolute;
            left: 0; right: 0; bottom: 0;
            z-index: 5;
            border-radius: 0 0 4px 4px;
            background: linear-gradient(to top, #0d2208 0%, #142e0c 20%, #236318 60%, #2d5a1b 75%, #3d6b24 90%, transparent 100%);
        }
        .labels-area {
            position: absolute;
            left: 0; right: 0; bottom: 15px;
            z-index: 100;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }
        .label-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 150px;
        }
        .option-label {
            color: #ffffff;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
            margin-top: 5px;
            text-align: center;
            max-width: 100%;
            word-wrap: break-word;
        }
        .option-percentage {
            color: #ffdd00;
            font-size: 26px;
            text-shadow: 2px 2px 0 #000;
        }
        .option-percentage.winner {
            color: #44ff44;
            font-size: 30px;
        }
        .vote-count {
            color: #aaffaa;
            font-size: 14px;
            text-shadow: 1px 1px 0 #000;
        }
        .spargel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            max-height: 310px;
            margin-bottom: 50px;
        }
        .poll-option {
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.35s ease, transform 0.45s ease;
        }
        .poll-option.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .label-group {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .label-group.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .spargel-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            line-height: 0;
            transition: transform 0.7s ease;
            transform: scaleY(0);
        }
        .spargel-spitze {
            margin-bottom: -15px;
            z-index: 2;
            width: 70px;
            height: auto;
        }
        .spargel-mitte {
            margin-top: -15px;
            z-index: 1;
            width: 70px;
            height: auto;
        }
        .status-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            z-index: 9999;
        }
        .status-indicator.connected {
            background: #44ff44;
            box-shadow: 0 0 10px rgba(68, 255, 68, 0.5);
        }
        .no-poll-message {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 24px;
            text-shadow: 2px 2px 0 #000;
            opacity: 0.7;
            z-index: 99;
        }
        .poll-ended-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .poll-ended-overlay.visible {
            display: flex;
        }
        .poll-ended-message {
            font-size: 48px;
            color: #ffdd00;
            text-shadow: 4px 4px 0 #000;
            animation: fadeInScale 0.5s ease-out;
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    

        .poll-option.winner {
            z-index: 30;
        }

        .spargel-container {
            overflow: visible;
        }

        .winner-tip-deco {
            position: absolute;
            left: 50%;
            top: 0;
            width: 118px;
            height: 118px;
            transform: translateX(-50%);
            pointer-events: none;
            opacity: 0;
            z-index: 40;
        }

        .winner-tip-deco.visible {
            opacity: 1;
        }

        .winner-tip-deco.show-rays .winner-rays {
            opacity: 0.9;
            transform: translateX(-50%) scale(1);
        }

        .winner-rays {
            position: absolute;
            left: 50%;
            top: 0;
            width: 108px;
            height: 108px;
            transform: translateX(-50%) scale(0.74);
            transform-origin: center center;
            border-radius: 50%;
            opacity: 0;
            z-index: 2;
            background: radial-gradient(circle, rgba(255,236,130,0.50) 0%, rgba(255,217,90,0.28) 24%, rgba(255,210,70,0.12) 42%, rgba(255,210,70,0) 66%);
            transition: opacity 1.15s ease-out, transform 1.15s ease-out;
        }

        .winner-rays::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                rgba(255, 220, 100, 0) 0deg 12deg,
                rgba(255, 231, 140, 0.95) 12deg 20deg,
                rgba(255, 220, 100, 0) 20deg 42deg,
                rgba(255, 231, 140, 0.95) 42deg 50deg,
                rgba(255, 220, 100, 0) 50deg 72deg,
                rgba(255, 231, 140, 0.95) 72deg 80deg,
                rgba(255, 220, 100, 0) 80deg 102deg,
                rgba(255, 231, 140, 0.95) 102deg 110deg,
                rgba(255, 220, 100, 0) 110deg 132deg,
                rgba(255, 231, 140, 0.95) 132deg 140deg,
                rgba(255, 220, 100, 0) 140deg 162deg,
                rgba(255, 231, 140, 0.95) 162deg 170deg,
                rgba(255, 220, 100, 0) 170deg 192deg,
                rgba(255, 231, 140, 0.95) 192deg 200deg,
                rgba(255, 220, 100, 0) 200deg 222deg,
                rgba(255, 231, 140, 0.95) 222deg 230deg,
                rgba(255, 220, 100, 0) 230deg 252deg,
                rgba(255, 231, 140, 0.95) 252deg 260deg,
                rgba(255, 220, 100, 0) 260deg 282deg,
                rgba(255, 231, 140, 0.95) 282deg 290deg,
                rgba(255, 220, 100, 0) 290deg 312deg,
                rgba(255, 231, 140, 0.95) 312deg 320deg,
                rgba(255, 220, 100, 0) 320deg 360deg);
            -webkit-mask: radial-gradient(circle, transparent 0 22px, #000 38px, transparent 58px);
            mask: radial-gradient(circle, transparent 0 22px, #000 38px, transparent 58px);
            filter: blur(0.5px);
        }




    </style>
</head>

        function getBarLevel(percentage) {
            return Math.max(0, Math.min(100, percentage));
        }

        function clonePollData(data) {
            return JSON.parse(JSON.stringify(data));
        }

        function setBarLevel(bar, level) {
            const stack = bar.querySelector('.spargel-stack');
            if (stack) {
                const clamped = Math.max(0, Math.min(100, level));
                const minScale = 0.14;
                const scale = minScale + (Math.sqrt(clamped / 100) * (1 - minScale));
                stack.style.transform = `scaleY(${Math.min(1, scale)})`;
                requestAnimationFrame(() => updateWinnerDecorationPosition(bar));
            }
        }

        function ensureWinnerDecoration(bar) {
            if (!bar) return null;
            return bar.querySelector('.winner-tip-deco');
        }

        function updateWinnerDecorationPosition(bar) {
            if (!bar) return;
            const container = bar.querySelector('.spargel-container');
            const tip = bar.querySelector('.spargel-spitze');
            const deco = bar.querySelector('.winner-tip-deco');
            if (!container || !tip || !deco) return;

            const containerRect = container.getBoundingClientRect();
            const tipRect = tip.getBoundingClientRect();
            if (!containerRect.width || !tipRect.width || !tipRect.height) return;

            const centerX = (tipRect.left - containerRect.left) + (tipRect.width / 2);
            const tipTop = tipRect.top - containerRect.top;

            deco.style.left = `${centerX}px`;
            deco.style.top = `${Math.round(tipTop - 30)}px`;
        }

        function resetWinnerDecoration(bar) {
            const deco = ensureWinnerDecoration(bar);
            if (!deco) return;
            deco.classList.remove('animate');
            deco.classList.remove('show-rays');
            deco.classList.remove('visible');
        }

        function triggerWinnerDecoration(bar) {
            const deco = ensureWinnerDecoration(bar);
            if (!deco) return;
            resetWinnerDecoration(bar);
            const run = () => {
                updateWinnerDecorationPosition(bar);
                deco.classList.add('visible');
                void deco.offsetWidth;
                deco.classList.add('show-rays');
            };
            requestAnimationFrame(() => {
                requestAnimationFrame(run);
            });
        }

        window.addEventListener('resize', () => {
            document.querySelectorAll('.poll-option.winner').forEach(bar => {
                updateWinnerDecorationPosition(bar);
            });
        });

        function showWinnerAnnouncement(optionName, isTie = false) {
            const el = document.getElementById('winnerAnnouncement');
            if (!el) return;
            if (!optionName && !isTie) {
                el.textContent = '';
                el.classList.remove('visible');
                return;
            }
            el.textContent = isTie ? 'Kein Sieger - Gleichstand' : `Sieger: ${optionName}`;
            requestAnimationFrame(() => {
                el.classList.add('visible');
            });
        }

        function hideWinnerAnnouncement() {
            const el = document.getElementById('winnerAnnouncement');
            if (!el) return;
            el.classList.remove('visible');
            el.textContent = '';

        function setLabelContent(label, option, isWinner = false) {
            const percentClass = isWinner ? 'option-percentage winner' : 'option-percentage';
            const winnerIcon = '';
            label.innerHTML = `<div class='${percentClass}'>${option.percentage}%${winnerIcon}</div><div class='option-label'>${option.name}</div><div class='vote-count'>${option.votes} Stimmen</div>`;
        }

        function scheduleBufferedPollUpdate(data) {
            pendingPollData = clonePollData(data);
            clearTimeout(bufferedPollTimer);
            bufferedPollTimer = setTimeout(() => {
                if (!pendingPollData) return;
                currentPoll = clonePollData(pendingPollData);
                updatePollValues(currentPoll);
                pendingPollData = null;
            }, CONFIG.UPDATE_BUFFER_MS);
        }

        function clearMockTimers() {
            mockTimers.forEach(timer => clearTimeout(timer));
            mockTimers = [];

        function queueMock(delay, callback) {
            const timer = setTimeout(callback, delay);
            mockTimers.push(timer);
        }

        async function fetchAccessToken() {
            if (!CONFIG.TOKEN_ENDPOINT) {
                console.warn('⚠️ TOKEN_ENDPOINT nicht konfiguriert');
                return false;
            }
            try {
                console.log('🔑 Hole Access-Token vom Auth-Server...');
                const response = await fetch(CONFIG.TOKEN_ENDPOINT, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Auth-Server antwortet mit ${response.status}`);
                }
                const data = await response.json();
                if (!data.access_token) {
                    throw new Error('Kein access_token im Response');
                }
                CONFIG.ACCESS_TOKEN = data.access_token;
                console.log('✅ Access-Token erfolgreich geholt');
                return true;
            } catch (error) {
                console.error('❌ Fehler beim Token-Holen:', error);
                document.getElementById('pollQuestion').textContent = 'Auth-Server nicht erreichbar!';
                return false;
            }
        }

        async function getUserId() {
            try {
                const response = await fetch('https://api.twitch.tv/helix/users', {
                    headers: {
                        'Authorization': `Bearer ${CONFIG.ACCESS_TOKEN}`,
                        'Client-Id': CONFIG.CLIENT_ID
                    }
                });
                const data = await response.json();
                if (data.data && data.data[0]) {
                    return data.data[0].id;
                }
            } catch (error) { console.error('Fehler bei User-ID:', error); }
            return null;
        }
        async function checkForActivePoll() {
            try {
                const response = await fetch(`https://api.twitch.tv/helix/polls?broadcaster_id=${CONFIG.BROADCASTER_ID}`, {
                    headers: {
                        'Authorization': `Bearer ${CONFIG.ACCESS_TOKEN}`,
                        'Client-Id': CONFIG.CLIENT_ID
                    }
                });
                const data = await response.json();
                if (data.data && data.data.length > 0) {
                    const poll = data.data[0];
                    if (poll.status === 'ACTIVE') {
                        if (currentPollId !== poll.id) {
                            currentPollId = poll.id;
                            handlePollFromAPI(poll);
                        } else { updatePollFromAPI(poll); }
                    } else { hideWhenNoPoll(); }
                } else { hideWhenNoPoll(); }
            } catch (error) { console.error('Poll-API-Fehler:', error); }
        }
        function handlePollFromAPI(poll) {
            const nextPoll = {
                id: poll.id,
                question: poll.title,
                options: poll.choices.map(choice => ({
                    id: choice.id,
                    name: choice.title,
                    votes: choice.votes || 0
                })),
                ended: false
            };

            const isNewPoll = !currentPoll || currentPoll.id !== nextPoll.id;

            currentPoll = nextPoll;
            currentPollId = nextPoll.id;

            if (poll.ends_at) startTimer(poll.ends_at);

            if (isNewPoll) {
                renderPoll(currentPoll, true);
                showWidget();
            } else {
                scheduleBufferedPollUpdate(currentPoll);
            }
        }
        function updatePollFromAPI(poll) {
            if (!currentPoll) return;

            currentPoll = {
                ...currentPoll,
                options: poll.choices.map(choice => ({
                    id: choice.id,
                    name: choice.title,
                    votes: choice.votes || 0
                }))
            };

            scheduleBufferedPollUpdate(currentPoll);
        }
        function startTimer(endsAt) {
            clearInterval(timerInterval);
            pollEndTime = new Date(endsAt);
            document.getElementById('timerContainer').style.display = 'flex';
            timerInterval = setInterval(updateTimer, 100);
            updateTimer();
        }
        function updateTimer() {
            if (!pollEndTime) return;
            const now = new Date();
            const remaining = Math.max(0, Math.floor((pollEndTime - now) / 1000));
            document.getElementById('timer').textContent = remaining;
            if (remaining === 0) { clearInterval(timerInterval); document.getElementById('timer').textContent = '0'; }
        }
        function stopTimer() { clearInterval(timerInterval); document.getElementById('timerContainer').style.display = 'none'; }
        function connectToTwitch() {
            websocket = new WebSocket('wss://eventsub.wss.twitch.tv/ws');
            websocket.onopen = () => { updateStatus(true); };
            websocket.onmessage = async (event) => {
                const message = JSON.parse(event.data);
                if (message.metadata.message_type === 'session_welcome') {
                    sessionId = message.payload.session.id;
                    await subscribeToPolls();
                    reconnectAttempts = 0;
                    await checkForActivePoll();
                }
                if (message.metadata.message_type === 'notification') { handlePollEvent(message.payload.event); }
            };
            websocket.onerror = (error) => { updateStatus(false); };
            websocket.onclose = () => {
                updateStatus(false);
                if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts++;
                    setTimeout(connectToTwitch, 5000);
                }
            };
        }
        async function subscribeToPolls() {
            const events = ['channel.poll.begin', 'channel.poll.progress', 'channel.poll.end'];
            for (const eventType of events) {
                try { await fetch('https://api.twitch.tv/helix/eventsub/subscriptions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${CONFIG.ACCESS_TOKEN}`,
                            'Client-Id': CONFIG.CLIENT_ID,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            type: eventType,
                            version: '1',
                            condition: { broadcaster_user_id: CONFIG.BROADCASTER_ID },
                            transport: { method: 'websocket', session_id: sessionId }
                        })
                    });
                } catch (error) {}
            }
        }
        function handlePollEvent(event) {
            if (event.status === 'completed' || event.status === 'terminated' || event.status === 'archived') {
                stopTimer();
                clearInterval(pollCheckInterval);

                if (!currentPoll) {
                    currentPoll = {
                        id: event.id,
                        question: event.title,
                        options: event.choices.map(choice => ({
                            id: choice.id,
                            name: choice.title,
                            votes: choice.votes || 0
                        })),
                        ended: false
                    };
                }

                clearTimeout(resultFinalizeTimer);
                resultFinalizeTimer = setTimeout(() => {
                    currentPoll = {
                        ...currentPoll,
                        id: event.id,
                        question: event.title,
                        options: event.choices.map(choice => ({
                            id: choice.id,
                            name: choice.title,
                            votes: choice.votes || 0
                        })),
                        ended: true
                    };

                    updatePollValues(currentPoll);
                    document.getElementById('pollEndedOverlay').classList.add('visible');

                    setTimeout(() => {
                        document.getElementById('pollEndedOverlay').classList.remove('visible');

                        setTimeout(() => {
                            hideWhenNoPoll();

                            setTimeout(() => {
                                currentPoll = null;
                                currentPollId = null;
                                showNoPoll();
                            }, CONFIG.RESULT_HIDE_DELAY);
                        }, CONFIG.RESULT_DISPLAY_DURATION);
                    }, CONFIG.ENDED_OVERLAY_DURATION);
                }, CONFIG.RESULT_SETTLE_DELAY);

                return;
            }

            if (!event.status || event.status === 'active') {
                const nextPoll = {
                    id: event.id,
                    question: event.title,
                    options: event.choices.map(choice => ({
                        id: choice.id,
                        name: choice.title,
                        votes: choice.votes || 0
                    })),
                    ended: false
                };

                const isNewPoll = !currentPoll || currentPoll.id !== nextPoll.id;

                currentPollId = event.id;
                currentPoll = nextPoll;

                if (event.ends_at) startTimer(event.ends_at);

                if (isNewPoll) {
                    renderPoll(currentPoll, true);
                    showWidget();
                } else {
                    scheduleBufferedPollUpdate(currentPoll);
                }

                clearInterval(pollCheckInterval);
                pollCheckInterval = setInterval(checkForActivePoll, CONFIG.POLL_CHECK_INTERVAL);
            }
        }
        function calculatePercentages(options) {
            const totalVotes = options.reduce((sum, opt) => sum + opt.votes, 0);
            return options.map(opt => ({ ...opt, percentage: totalVotes > 0 ? Math.round((opt.votes / totalVotes) * 100) : 0 }));
        }
        function findWinner(options) {
            if (!options || options.length === 0) return null;
            const maxVotes = Math.max(...options.map(o => o.votes));
            const winners = options.filter(o => o.votes === maxVotes);
            return winners.length === 1 ? winners[0] : null;
        }

        function hasTie(options) {
            if (!options || options.length === 0) return false;
            const maxVotes = Math.max(...options.map(o => o.votes));
            return options.filter(o => o.votes === maxVotes).length > 1;
        }
        function renderPoll(data, isInitial = false) {
            document.getElementById('pollQuestion').textContent = data.question;

            const pollArea = document.getElementById('pollArea');
            const labelsArea = document.getElementById('labelsArea');

            if (isInitial) {
                pollArea.innerHTML = '';
                labelsArea.innerHTML = '';
            }

            const optionsWithPercentages = calculatePercentages(data.options);
            const maxVotes = data.ended && optionsWithPercentages.length ? Math.max(...optionsWithPercentages.map(o => o.votes)) : null;
            const tieAtTop = data.ended && hasTie(optionsWithPercentages);

            optionsWithPercentages.forEach((option, index) => {
                const isWinner = data.ended && !tieAtTop && option.votes === maxVotes;
                const level = getBarLevel(option.percentage);

                if (isInitial) {
                    const bar = document.createElement('div');
                    bar.className = 'poll-option';
                    bar.setAttribute('data-option-id', option.id || option.name);
                    bar.innerHTML = `<div class='spargel-container'><div class='winner-tip-deco'><div class='winner-rays'></div></div><div class='spargel-stack'><img src='${SPITZE_IMG}' class='spargel-spitze' alt='Spitze'>${Array(10).fill(`<img src='${MITTE_IMG}' class='spargel-mitte' alt='Mitte'>`).join('')}</div></div>`;
                    pollArea.appendChild(bar);

                    const label = document.createElement('div');
                    label.className = 'label-group';
                    label.setAttribute('data-option-id', option.id || option.name);
                    setLabelContent(label, { ...option, percentage: 0, votes: 0 }, false);
                    labelsArea.appendChild(label);

                    const barDelay = CONFIG.INTRO_BAR_DELAY + (index * CONFIG.INTRO_STAGGER);
                    const valueDelay = CONFIG.INTRO_VALUE_DELAY + (index * CONFIG.INTRO_STAGGER);

                    setTimeout(() => {
                        bar.classList.add('visible');
                        setBarLevel(bar, level);
                        if (data.ended && tieAtTop) {
                            showWinnerAnnouncement('', true);
                        } else if (isWinner && data.ended) {
                            bar.classList.add('winner');
                            triggerWinnerDecoration(bar);
                            showWinnerAnnouncement(option.name);
                        }
                    }, barDelay);

                    setTimeout(() => {
                        label.classList.add('visible');
                        setLabelContent(label, option, !!isWinner && data.ended);
                    }, valueDelay);
                }
            });

            if (!data.ended) hideWinnerAnnouncement();
            if (!isInitial) updatePollValues(data);
        }
        function updatePollValues(data) {
            const optionsWithPercentages = calculatePercentages(data.options);
            const maxVotes = data.ended && optionsWithPercentages.length ? Math.max(...optionsWithPercentages.map(o => o.votes)) : null;
            const tieAtTop = data.ended && hasTie(optionsWithPercentages);
            if (tieAtTop) {
                showWinnerAnnouncement('', true);
            }

            optionsWithPercentages.forEach(option => {
                const isWinner = data.ended && !tieAtTop && option.votes === maxVotes;
                const level = getBarLevel(option.percentage);

                const bar = document.querySelector(`[data-option-id="${option.id || option.name}"].poll-option`);
                if (bar) {
                    clearTimeout(bar._barTimer);
                    clearTimeout(bar._winnerTimer);

                    bar._barTimer = setTimeout(() => {
                        setBarLevel(bar, level);
                    }, 0);

                    bar._winnerTimer = setTimeout(() => {
                        if (isWinner && data.ended) {
                            bar.classList.add('winner');
                            triggerWinnerDecoration(bar);
                            showWinnerAnnouncement(option.name);
                        } else {
                            bar.classList.remove('winner');
                            resetWinnerDecoration(bar);
                        }
                    }, CONFIG.WINNER_UPDATE_DELAY);
                }

                const label = document.querySelector(`[data-option-id="${option.id || option.name}"].label-group`);
                if (label) {
                    clearTimeout(label._valueTimer);
                    clearTimeout(label._winnerTimer);

                    label._valueTimer = setTimeout(() => {
                        label.classList.add('visible');
                        setLabelContent(label, option, false);
                    }, CONFIG.VALUE_UPDATE_DELAY);

                    label._winnerTimer = setTimeout(() => {
                        if (data.ended) {
                            setLabelContent(label, option, !!isWinner);
                        }
                    }, CONFIG.WINNER_UPDATE_DELAY);
                }
            });
        }
        function showWidget() {
            if (!CONFIG.AUTO_HIDE) return;

            const widget = document.getElementById('widgetContainer');

            clearTimeout(widgetHideTimer);
            clearTimeout(widgetShowTimer);

            widgetShowTimer = setTimeout(() => {
                widget.classList.add('visible');
            }, CONFIG.INTRO_WIDGET_DELAY);
        }
        function hideWhenNoPoll() {
            if (!CONFIG.AUTO_HIDE) return;

            const widget = document.getElementById('widgetContainer');

            clearTimeout(widgetShowTimer);
            clearTimeout(widgetHideTimer);

            widgetHideTimer = setTimeout(() => {
                widget.classList.remove('visible');
            }, CONFIG.RESULT_HIDE_DELAY);
        }
        function showNoPoll() {
            document.getElementById('pollQuestion').textContent = 'Warte auf Abstimmung...';
            document.getElementById('pollArea').innerHTML = '<div class="no-poll-message">Keine aktive Abstimmung</div>';
            document.getElementById('labelsArea').innerHTML = '';
            hideWinnerAnnouncement();
            stopTimer();
        }
        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            if (connected) indicator.classList.add('connected');
            else indicator.classList.remove('connected');
        }
        async function init() {
            if (CONFIG.TEST_MODE) {
                console.log('🧪 Mock-Testmodus aktiv');
                showNoPoll();
                startMockDemo();
                return;
            }

            // Token vom Server holen - NEU!
            if (CONFIG.TOKEN_ENDPOINT) {
                try {
                    const res = await fetch(CONFIG.TOKEN_ENDPOINT);
                    if (!res.ok) throw new Error('Server antwortet nicht');
                    const data = await res.json();
                    CONFIG.ACCESS_TOKEN = data.access_token;
                    console.log('✅ Access-Token vom Server geholt');
                } catch (err) {
                    console.error('❌ Token-Fehler:', err);
                    document.getElementById('pollQuestion').textContent = 'Auth-Server nicht erreichbar!';
                    return;
                }
            }
            console.log('🚀 Widget Start');
            console.log('⚙️ AUTO_HIDE:', CONFIG.AUTO_HIDE);

            // Token vom Auth-Server holen
            if (CONFIG.TOKEN_ENDPOINT) {
                const success = await fetchAccessToken();
                if (!success) return;
            }

            if (CONFIG.CLIENT_ID === 'DEINE_CLIENT_ID_HIER') {
                console.error('❌ CLIENT_ID nicht konfiguriert!');
                document.getElementById('pollQuestion').textContent = 'Konfiguration fehlt!';
                return;
            }

            if (!CONFIG.ACCESS_TOKEN) {
                console.error('❌ Kein ACCESS_TOKEN vorhanden!');
                document.getElementById('pollQuestion').textContent = 'Kein Access-Token!';
                return;
            }

            if (CONFIG.BROADCASTER_ID === 'DEINE_BROADCASTER_ID_HIER') {
                const userId = await getUserId();
                if (userId) {
                    CONFIG.BROADCASTER_ID = userId;
                    console.log('✅ Broadcaster ID:', userId);
                } else {
                    return;
                }
            }

            connectToTwitch();
        }
        init();
    </script>
